<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>кiгл // PRO</title>
    <style>
        /* CSS Variables & Theme Setup */
        :root {
            --bg-color: #0d0d0d;
            --text-color: #f4f4f4;
            --nav-text: #888;
            --button-bg: #f4f4f4;
            --button-text: #0d0d0d;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        .light-mode {
            --bg-color: #f4f5f5;
            --text-color: #1a1a1a;
            --nav-text: #777;
            --button-bg: #1a1a1a;
            --button-text: #f4f5f5;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--nav-text);
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-color);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        .nav-left span {
            color: var(--text-color);
            font-weight: 500;
        }

        .nav-right {
            display: flex;
            gap: 15px;
        }

        .pill {
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .pill:hover {
            border-color: var(--text-color);
            color: var(--text-color);
        }

        .pill.active {
            background: var(--button-bg);
            color: var(--button-text);
            border-color: var(--button-bg);
        }

        /* Main Center Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 100px;
        }

        .logo-mark {
            font-size: 24px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: 15px;
            margin-bottom: 20px;
            margin-right: -15px;
        }

        .subtitle {
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--nav-text);
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .main-btn {
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .main-btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--nav-text);
            margin-top: auto;
        }

        /* Blog Display Area (Displays actual images uploaded) */
        #feed-area {
            display: none;
            max-width: 900px;
            margin: 120px auto 40px;
            padding: 0 20px;
            width: 100%;
        }

        .post-image-display {
            max-width: 100%;
            border: 1px solid var(--border-color);
            margin-bottom: 60px;
            display: block;
        }

        /* Secret Password Modal */
        #password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .password-box {
            text-align: center;
            width: 100%;
            max-width: 300px;
        }

        .password-box input {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border-radius: 4px;
            outline: none;
            width: 100%;
            letter-spacing: 5px;
        }

        .password-box label {
            color: #888;
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        /* Secret Admin Panel (Image Generator Editor) */
        #admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            padding: 40px;
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            overflow-y: auto;
        }

        #admin-panel.active {
            transform: translateY(0);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .admin-header h2 {
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 16px;
        }

        .close-admin {
            cursor: pointer;
            font-size: 24px;
            color: var(--nav-text);
        }

        .editor-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .editor-form {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
            width: 100%;
        }

        .editor-form input, .editor-form textarea {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 15px;
            font-size: 16px;
            border-radius: 4px;
            outline: none;
        }

        .editor-form textarea {
            min-height: 200px;
            resize: vertical;
        }

        .editor-form input:focus, .editor-form textarea:focus {
            border-color: var(--text-color);
        }

        /* Image generation controls */
        .preview-pane {
            flex: 2;
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
            position: relative;
            min-height: 500px;
        }

        #canvas-preview {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--border-color);
            display: none; /* Only show when generated */
        }
    </style>
</head>
<body class="light-mode"> <!-- Changed default to light-mode, based on screenshot 0 -->

    <nav>
        <div class="nav-left">
            ✦ <span>к i г л</span> FOCUS // PRO
        </div>
        <div class="nav-right">
            <div class="pill active" id="view-feed-btn" onclick="toggleFeed()">VIEW NEWS</div>
            <div class="pill" onclick="toggleTheme()">THEME: LIGHT</div>
        </div>
    </nav>

    <!-- Main Landing View -->
    <main id="landing-area">
        <div class="logo-mark">✦</div>
        <h1>к i г л</h1>
        <div class="subtitle">← Secret Code Needed For Editor | Swipe For Modes →</div>
        <button class="main-btn" onclick="toggleFeed()">ACCESS PUBLIC FEED</button>
    </main>

    <!-- Public Feed View (This is where the 'Real Site' is) -->
    <div id="feed-area">
        <!-- New post images are loaded here -->
    </div>

    <!-- Hidden Password Modal (Step 2) -->
    <div id="password-modal">
        <div class="password-box">
            <label>ENTER ACCESS KEY</label>
            <input type="password" id="access-password-input" maxlength="4">
        </div>
    </div>

    <!-- Hidden Admin Panel (Image Generator Editor) -->
    <div id="admin-panel">
        <div class="admin-header">
            <h2>Image Transmission Generator</h2>
            <div class="close-admin" onclick="closeAdmin()">✕</div>
        </div>
        
        <div class="editor-container">
            <div class="editor-form">
                <input type="text" id="post-title" placeholder="TRANSMISSION TITLE...">
                <textarea id="post-content" placeholder="Type your core transmission text here...\n(Line breaks are kept)"></textarea>
                
                <label style="font-size: 11px; letter-spacing: 2px; color: var(--nav-text);">ATTACH CORE IMAGE (OPTIONAL)</label>
                <input type="file" id="post-image" accept="image/*" style="border: none; padding: 0;">
                
                <button class="main-btn" onclick="generateAndPreview()" style="margin-top: 20px;">1. GENERATE PREVIEW</button>
                <button class="main-btn" onclick="downloadImagePost()" style="margin-top: 10px; background-color: var(--border-color); color: var(--nav-text);" id="dl-btn" disabled>2. DOWNLOAD PNG TRANS</button>
            </div>
            
            <div class="preview-pane">
                <canvas id="canvas-preview"></canvas>
            </div>
        </div>
    </div>

    <footer id="footer-time"></footer>

    <script>
        // =========================================================================
        // =========================================================================
        // !!! ATTENTION !!! THE real site part lives here.
        // Step 3 (The Code Part): You must put the exact names of the image 
        // files you have uploaded to the SAME FOLDER as this HTML file into 
        // this list array.
        
        // Example with one post: const POST_FILES = ['post1.png'];
        // Example with two posts: const POST_FILES = ['post1.png', 'post2.png'];
        
        const POST_FILES = ['kira1.png' , 'kira2.png']; // <--- EDIT THIS ARRAY VARIABLE DIRECTLY !!!
        
        // =========================================================================
        // =========================================================================

        // --- 1. Clock Logic ---
        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('footer-time').innerText = `${hours}:${minutes} ${ampm}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- 2. Theme Toggle ---
        let isLight = true; // Based on image 0
        function toggleTheme() {
            isLight = !isLight;
            document.body.classList.toggle('light-mode');
            const themeBtn = document.querySelectorAll('.pill')[1];
            themeBtn.innerText = isLight ? "THEME: LIGHT" : "THEME: DARK";
        }

        // --- 3. View Toggling (Real Site Display Logic) ---
        function toggleFeed() {
            const landing = document.getElementById('landing-area');
            const feed = document.getElementById('feed-area');
            const feedBtn = document.getElementById('view-feed-btn');
            
            if (landing.style.display === 'none') {
                landing.style.display = 'flex';
                feed.style.display = 'none';
                feedBtn.innerText = 'VIEW NEWS';
                feedBtn.classList.add('active');
            } else {
                landing.style.display = 'none';
                feed.style.display = 'block';
                feedBtn.innerText = 'HOME SYSTEM';
                feedBtn.classList.remove('active');
                loadPostImages(); // Load posts from the list array defined above
            }
        }

        // --- 4. Loading the Images (The Real Site Display) ---
        function loadPostImages() {
            const feedArea = document.getElementById('feed-area');
            feedArea.innerHTML = ''; // Clear previous

            if (POST_FILES.length === 0) {
                feedArea.innerHTML = '<p style="text-align:center; color: var(--nav-text); letter-spacing: 3px; font-size:12px; margin-top:100px;">NO DATA TRANSMISSIONS IN NETWORK.</p>';
                return;
            }

            // Loop through the list of filenames you created and make image tags
            POST_FILES.forEach(filename => {
                const img = document.createElement('img');
                img.src = filename; // This assumes the image is in the SAME folder
                img.alt = `Post: ${filename}`;
                img.className = 'post-image-display';
                
                // Add error handling if file not found
                img.onerror = function() {
                    console.error("Could not find file: " + filename + ". Ensure it is in the same folder.");
                    const errorBox = document.createElement('div');
                    errorBox.style.border = '1px solid red';
                    errorBox.style.padding = '20px';
                    errorBox.style.marginBottom = '60px';
                    errorBox.style.color = 'red';
                    errorBox.innerText = `ERROR: Transmission data not found. File: ${filename}`;
                    feedArea.appendChild(errorBox);
                    img.remove();
                };

                feedArea.appendChild(img);
            });
        }

        // --- 5. Secret Code & Password Logic ---
        const SECRET_CODE_1 = "kigl";
        const SECRET_CODE_2_PW = "kira";
        let keyBuffer = "";

        document.addEventListener('keydown', (e) => {
            // Step 1: Listen for kigl
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            keyBuffer += e.key.toLowerCase();
            
            if (keyBuffer.length > SECRET_CODE_1.length) {
                keyBuffer = keyBuffer.slice(-SECRET_CODE_1.length);
            }

            if (keyBuffer === SECRET_CODE_1) {
                showPasswordModal();
                keyBuffer = "";
            }
        });

        const passwordInput = document.getElementById('access-password-input');
        const passwordModal = document.getElementById('password-modal');

        function showPasswordModal() {
            passwordModal.style.display = 'flex';
            passwordInput.focus();
        }

        function hidePasswordModal() {
            passwordModal.style.display = 'none';
            passwordInput.value = '';
        }

        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (passwordInput.value === SECRET_CODE_2_PW) {
                    hidePasswordModal();
                    openAdmin();
                } else {
                    alert('ACCESS DENIED. Network terminated.');
                    hidePasswordModal();
                }
            }
        });

        function openAdmin() {
            document.getElementById('admin-panel').classList.add('active');
        }

        function closeAdmin() {
            document.getElementById('admin-panel').classList.remove('active');
        }

        // --- 6. Image Generation & Download Logic ---
        const canvas = document.getElementById('canvas-preview');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('dl-btn');
        let generatedDataUrl = null;

        function generateAndPreview() {
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const imageFile = document.getElementById('post-image').files[0];

            if (!title || !content) {
                alert("Both Title and Content required to generate.");
                return;
            }

            // Define canvas base properties
            canvas.width = 1000; // Fixed width for consistent quality
            canvas.style.display = 'block';

            // Start drawing
            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        drawCanvasContent(title, content, img);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(imageFile);
            } else {
                drawCanvasContent(title, content, null);
            }
        }

        // The core drawing engine
        function drawCanvasContent(title, content, uploadedImage) {
            // 1. Calculate required dynamic height
            const padding = 60;
            const watermarkHeight = 60;
            const titleHeight = 80;
            const dateHeight = 40;
            let imageHeight = 0;
            let imageWidth = 0;

            if (uploadedImage) {
                // Scale uploaded image to fit canvas width (keeping ratio)
                const targetWidth = canvas.width - (padding * 2);
                const ratio = targetWidth / uploadedImage.width;
                imageWidth = targetWidth;
                imageHeight = uploadedImage.height * ratio;
            }

            // Word wrap content text for height calculation
            ctx.font = '24px -apple-system, sans-serif';
            ctx.fillStyle = '#f4f4f4'; // Draw dark background always for high-contrast
            const wrappedContent = wrapText(content, canvas.width - (padding * 2), 36); // lineHeight=36
            const textHeight = wrappedContent.lines.length * 36;

            // Set final canvas dynamic height
            canvas.height = padding + titleHeight + dateHeight + (uploadedImage ? imageHeight + padding : 0) + textHeight + (padding * 2) + watermarkHeight + padding;

            // 2. Clear background with dark theme
            ctx.fillStyle = '#0d0d0d'; // Clean dark background for high contrast
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 3. Draw Watermarks & Ornate زخرفه (زخرفه structure in corner)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; // Ornate watermark color
            ctx.font = '200px serif';
            ctx.fillText('𝕶', canvas.width - 250, 250); // Large stylized K for kigl

            // Main corner ornaments
            ctx.font = '30px serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillText('⚜', 30, 60); // Top left ⚜
            ctx.fillText('⚜', canvas.width - 60, canvas.height - 30); // Bottom right ⚜
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.font = '24px serif';
            // Corner borders
            ctx.fillText('╔═══════', 30, 40);
            ctx.fillText('═══════╗', canvas.width - 150, 40);
            ctx.fillText('╚═══════', 30, canvas.height - 30);
            ctx.fillText('═══════╝', canvas.width - 150, canvas.height - 30);

            // Small text watermarks
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.font = '12px sans-serif';
            ctx.letterSpacing = '5px';
            ctx.fillText('KIGL TRANSMISSION PRO', padding, padding);
            ctx.fillText('CONFIDENTIAL', canvas.width - padding - 150, canvas.height - padding);
            
            // Ornate structure text زخرفه (repeated small patterns)
            ctx.font = '10px serif';
            ctx.fillText('✧✦✧✦✧✦✧✦✧✦', padding, canvas.height - padding + 20);

            // Reset ctx properties for main content drawing
            ctx.letterSpacing = '0px';

            // 4. Draw Title
            ctx.fillStyle = '#f4f4f4'; // Bright white
            ctx.font = '400 64px -apple-system, sans-serif'; // Clean, thin, large font
            ctx.fillText(title, padding, padding + 70);

            // 5. Draw Timestamp
            const timestamp = `TRANSMITTED: ${new Date().toLocaleTimeString()} [${new Date().toLocaleDateString()}]`;
            ctx.fillStyle = '#888888';
            ctx.font = '12px sans-serif';
            ctx.letterSpacing = '2px';
            ctx.fillText(timestamp, padding, padding + 70 + 40);
            ctx.letterSpacing = '0px';

            // 6. Draw Uploaded Image (if provided)
            let currentY = padding + titleHeight + dateHeight + padding;
            if (uploadedImage) {
                ctx.drawImage(uploadedImage, padding, currentY, imageWidth, imageHeight);
                currentY += imageHeight + padding;
            }

            // 7. Draw Content Text (with wrap)
            ctx.fillStyle = '#f4f4f4';
            ctx.font = '24px -apple-system, sans-serif';
            ctx.lineHeight = 36;
            
            wrappedContent.lines.forEach((line, index) => {
                ctx.fillText(line, padding, currentY + (index * 36));
            });

            // --- Finish Generation ---
            generatedDataUrl = canvas.toDataURL('image/png');
            downloadBtn.disabled = false;
            downloadBtn.style.backgroundColor = '#f4f4f4';
            downloadBtn.style.color = '#0d0d0d';
        }

        // Helper to wrap text with line break support (\n)
        function wrapText(text, maxWidth, lineHeight) {
            const paragraphs = text.split('\n');
            const lines = [];
            
            paragraphs.forEach(paragraph => {
                if (paragraph === "") {
                    lines.push(""); // Preserve empty lines
                    return;
                }
                const words = paragraph.split(' ');
                let line = '';
                
                for (let n = 0; n < words.length; n++) {
                    const testLine = line + words[n] + ' ';
                    const metrics = ctx.measureText(testLine);
                    const testWidth = metrics.width;
                    
                    if (testWidth > maxWidth && n > 0) {
                        lines.push(line.trim());
                        line = words[n] + ' ';
                    } else {
                        line = testLine;
                    }
                }
                lines.push(line.trim());
            });

            return { lines: lines };
        }

        // Final Download Logic
        function downloadImagePost() {
            if (!generatedDataUrl) return;
            const title = document.getElementById('post-title').value.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const filename = `kigl_post_${title}_${Date.now()}.png`;

            const link = document.createElement('a');
            link.download = filename;
            link.href = generatedDataUrl;
            link.click();
            
            alert(`✅ Transmission data downloaded. Save '${filename}' to the SAME FOLDER as this HTML file. \n\nThen manually open this HTML file in your code editor and update the POST_FILES list to include this filename.`);
            
            downloadBtn.disabled = true;
            downloadBtn.style.backgroundColor = 'var(--border-color)';
            downloadBtn.style.color = 'var(--nav-text)';
        }
    </script>
</body>
</html>
