<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>кiгл // PRO</title>
    <style>
        /* CSS Variables & Theme Setup */
        :root {
            --bg-color: #0d0d0d;
            --text-color: #f4f4f4;
            --nav-text: #888;
            --button-bg: #f4f4f4;
            --button-text: #0d0d0d;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        .light-mode {
            --bg-color: #f4f5f5;
            --text-color: #1a1a1a;
            --nav-text: #777;
            --button-bg: #1a1a1a;
            --button-text: #f4f5f5;
            --border-color: rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--nav-text);
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-color);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        .nav-left span {
            color: var(--text-color);
            font-weight: 500;
        }

        .nav-right {
            display: flex;
            gap: 15px;
        }

        .pill {
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .pill:hover {
            border-color: var(--text-color);
            color: var(--text-color);
        }

        .pill.active {
            background: var(--button-bg);
            color: var(--button-text);
            border-color: var(--button-bg);
        }

        /* Main Center Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 100px;
        }

        .logo-mark {
            font-size: 24px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: 15px;
            margin-bottom: 20px;
            margin-right: -15px;
        }

        .subtitle {
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--nav-text);
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        .main-btn {
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .main-btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--nav-text);
            margin-top: auto;
        }

        /* Blog Display Area */
        #feed-area {
            display: none;
            max-width: 900px;
            margin: 120px auto 40px;
            padding: 0 20px;
            width: 100%;
        }

        .post-image-display {
            max-width: 100%;
            border: 1px solid var(--border-color);
            margin-bottom: 60px;
            display: block;
        }

        /* Secret Password Modal */
        #password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .password-box {
            text-align: center;
            width: 100%;
            max-width: 300px;
        }

        .password-box input {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border-radius: 4px;
            outline: none;
            width: 100%;
            letter-spacing: 5px;
        }

        .password-box label {
            color: #888;
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        /* Secret Admin Panel */
        #admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            padding: 40px;
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            overflow-y: auto;
        }

        #admin-panel.active {
            transform: translateY(0);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .admin-header h2 {
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 16px;
        }

        .close-admin {
            cursor: pointer;
            font-size: 24px;
            color: var(--nav-text);
        }

        .editor-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .editor-form {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            width: 100%;
        }

        .editor-form input[type="text"], .editor-form textarea, .editor-form select {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 15px;
            font-size: 14px;
            border-radius: 4px;
            outline: none;
        }

        .editor-form select option {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .editor-form textarea {
            min-height: 150px;
            resize: vertical;
        }

        .editor-form input:focus, .editor-form textarea:focus, .editor-form select:focus {
            border-color: var(--text-color);
        }

        .control-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--nav-text);
            text-transform: uppercase;
            margin-bottom: -5px;
            margin-top: 5px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--text-color);
        }

        .preview-pane {
            flex: 2;
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
            position: relative;
            min-height: 500px;
            background: rgba(0,0,0,0.02);
            overflow: hidden;
        }

        #canvas-preview {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
            border: 1px solid var(--border-color);
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            /* Cursor updates via JavaScript during interaction */
        }
    </style>
</head>
<body class="light-mode">

    <nav>
        <div class="nav-left">
            ✦ <span>к i г л</span> FOCUS // PRO
        </div>
        <div class="nav-right">
            <div class="pill active" id="view-feed-btn" onclick="toggleFeed()">VIEW NEWS</div>
            <div class="pill" onclick="toggleTheme()">THEME: LIGHT</div>
        </div>
    </nav>

    <main id="landing-area">
        <div class="logo-mark">✦</div>
        <h1>к i г л</h1>
        <div class="subtitle">← Secret Code Needed For Editor | Swipe For Modes →</div>
        <button class="main-btn" onclick="toggleFeed()">ACCESS PUBLIC FEED</button>
    </main>

    <div id="feed-area"></div>

    <div id="password-modal">
        <div class="password-box">
            <label>ENTER ACCESS KEY</label>
            <input type="password" id="access-password-input" maxlength="4">
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-header">
            <h2>Image Transmission Generator</h2>
            <div class="close-admin" onclick="closeAdmin()">✕</div>
        </div>
        
        <div class="editor-container">
            <div class="editor-form">
                <input type="text" id="post-title" placeholder="TRANSMISSION TITLE..." oninput="autoGenerate()">
                <textarea id="post-content" placeholder="Type your core transmission text here...\n(Line breaks are kept)" oninput="autoGenerate()"></textarea>
                
                <label class="control-label">ASPECT RATIO</label>
                <select id="canvas-ratio" onchange="autoGenerate()">
                    <option value="auto">Auto (Fits Content)</option>
                    <option value="1:1">Square (1:1)</option>
                    <option value="3:4">Classic (3:4)</option>
                    <option value="9:16">Portrait (9:16)</option>
                    <option value="16:9">Landscape (16:9)</option>
                </select>

                <label class="control-label">ATTACH CORE IMAGE (OPTIONAL)</label>
                <!-- Added resetImagePos() on change to center new images -->
                <input type="file" id="post-image" accept="image/*" style="border: none; padding: 0;" onchange="resetImagePos(); autoGenerate()">
                
                <label class="control-label">IMAGE PREVIEW SCALE</label>
                <input type="range" id="image-scale" min="10" max="100" value="100" oninput="autoGenerate()">
                
                <button class="main-btn" onclick="generateAndPreview()" style="margin-top: 10px;">1. RENDER FINAL PREVIEW</button>
                <button class="main-btn" onclick="downloadImagePost()" style="margin-top: 5px; background-color: var(--border-color); color: var(--nav-text);" id="dl-btn" disabled>2. DOWNLOAD PNG TRANS</button>
            </div>
            
            <div class="preview-pane">
                <canvas id="canvas-preview"></canvas>
            </div>
        </div>
    </div>

    <footer id="footer-time"></footer>

    <script>
        // =========================================================================
        // ADD YOUR IMAGE FILENAMES HERE (e.g., ['post1.png', 'post2.png'])
        const POST_FILES = ['kira1.png' , 'kira2.png']; 
        // =========================================================================

        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('footer-time').innerText = `${hours}:${minutes} ${ampm}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        let isLight = true;
        function toggleTheme() {
            isLight = !isLight;
            document.body.classList.toggle('light-mode');
            const themeBtn = document.querySelectorAll('.pill')[1];
            themeBtn.innerText = isLight ? "THEME: LIGHT" : "THEME: DARK";
        }

        function toggleFeed() {
            const landing = document.getElementById('landing-area');
            const feed = document.getElementById('feed-area');
            const feedBtn = document.getElementById('view-feed-btn');
            
            if (landing.style.display === 'none') {
                landing.style.display = 'flex';
                feed.style.display = 'none';
                feedBtn.innerText = 'VIEW NEWS';
                feedBtn.classList.add('active');
            } else {
                landing.style.display = 'none';
                feed.style.display = 'block';
                feedBtn.innerText = 'HOME SYSTEM';
                feedBtn.classList.remove('active');
                loadPostImages();
            }
        }

        function loadPostImages() {
            const feedArea = document.getElementById('feed-area');
            feedArea.innerHTML = ''; 

            if (POST_FILES.length === 0) {
                feedArea.innerHTML = '<p style="text-align:center; color: var(--nav-text); letter-spacing: 3px; font-size:12px; margin-top:100px;">NO DATA TRANSMISSIONS IN NETWORK.</p>';
                return;
            }

            POST_FILES.forEach(filename => {
                const img = document.createElement('img');
                img.src = filename; 
                img.alt = `Post: ${filename}`;
                img.className = 'post-image-display';
                
                img.onerror = function() {
                    const errorBox = document.createElement('div');
                    errorBox.style.border = '1px solid red';
                    errorBox.style.padding = '20px';
                    errorBox.style.marginBottom = '60px';
                    errorBox.style.color = 'red';
                    errorBox.innerText = `ERROR: Transmission data not found. File: ${filename}`;
                    feedArea.appendChild(errorBox);
                    img.remove();
                };
                feedArea.appendChild(img);
            });
        }

        const SECRET_CODE_1 = "kigl";
        const SECRET_CODE_2_PW = "kira";
        let keyBuffer = "";

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

            keyBuffer += e.key.toLowerCase();
            if (keyBuffer.length > SECRET_CODE_1.length) {
                keyBuffer = keyBuffer.slice(-SECRET_CODE_1.length);
            }
            if (keyBuffer === SECRET_CODE_1) {
                showPasswordModal();
                keyBuffer = "";
            }
        });

        const passwordInput = document.getElementById('access-password-input');
        const passwordModal = document.getElementById('password-modal');

        function showPasswordModal() {
            passwordModal.style.display = 'flex';
            passwordInput.focus();
        }

        function hidePasswordModal() {
            passwordModal.style.display = 'none';
            passwordInput.value = '';
        }

        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (passwordInput.value === SECRET_CODE_2_PW) {
                    hidePasswordModal();
                    openAdmin();
                } else {
                    alert('ACCESS DENIED.');
                    hidePasswordModal();
                }
            }
        });

        function openAdmin() { document.getElementById('admin-panel').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active'); }

        const canvas = document.getElementById('canvas-preview');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('dl-btn');
        let generatedDataUrl = null;
        let previewTimer;

        // --- IMAGE DRAGGING LOGIC ---
        let customImageX = null;
        let customImageY = null;
        let currentImageWidth = 0;
        let currentImageHeight = 0;
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let hasUploadedImage = false;

        function resetImagePos() {
            customImageX = null;
            customImageY = null;
        }

        // Get accurate mouse/touch position mapped to the internal canvas resolution
        function getCanvasPosition(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        // Mouse & Touch Events for Dragging
        function handleStart(e) {
            if (!hasUploadedImage) return;
            const pos = getCanvasPosition(e);
            
            // Check if click is inside the uploaded image bounds
            if (pos.x >= customImageX && pos.x <= customImageX + currentImageWidth &&
                pos.y >= customImageY && pos.y <= customImageY + currentImageHeight) {
                isDragging = true;
                dragStartX = pos.x;
                dragStartY = pos.y;
                canvas.style.cursor = 'grabbing';
                // Prevent scrolling on mobile while dragging image
                if(e.type === 'touchstart') e.preventDefault(); 
            }
        }

        function handleMove(e) {
            if (!hasUploadedImage) return;
            const pos = getCanvasPosition(e);

            // Change cursor on hover
            if (!isDragging) {
                if (pos.x >= customImageX && pos.x <= customImageX + currentImageWidth &&
                    pos.y >= customImageY && pos.y <= customImageY + currentImageHeight) {
                    canvas.style.cursor = 'grab';
                } else {
                    canvas.style.cursor = 'default';
                }
                return;
            }

            // Perform drag
            const dx = pos.x - dragStartX;
            const dy = pos.y - dragStartY;
            customImageX += dx;
            customImageY += dy;
            dragStartX = pos.x;
            dragStartY = pos.y;
            
            // Redraw immediately for smooth dragging
            generateAndPreview(true);
        }

        function handleEnd() {
            isDragging = false;
            canvas.style.cursor = 'default';
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);
        
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        canvas.addEventListener('touchmove', handleMove, {passive: false});
        canvas.addEventListener('touchend', handleEnd);

        // --- GENERATION LOGIC ---
        function autoGenerate() {
            clearTimeout(previewTimer);
            previewTimer = setTimeout(() => generateAndPreview(false), 100);
        }

        // isDraggingUpdate is true if we are just redrawing during a mouse drag
        function generateAndPreview(isDraggingUpdate = false) {
            const title = document.getElementById('post-title').value || "UNTITLED TRANSMISSION";
            const content = document.getElementById('post-content').value || "Awaiting core text...";
            const imageFile = document.getElementById('post-image').files[0];

            // Only update dimensions if we aren't actively dragging (prevents canvas resize stutter)
            if (!isDraggingUpdate) {
                canvas.width = 1000;
                canvas.style.display = 'block';
            }

            if (imageFile) {
                hasUploadedImage = true;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() { drawCanvasContent(title, content, img, isDraggingUpdate); };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(imageFile);
            } else {
                hasUploadedImage = false;
                drawCanvasContent(title, content, null, isDraggingUpdate);
            }
        }

        function drawCanvasContent(title, content, uploadedImage, isDraggingUpdate) {
            const padding = 60;
            const titleHeight = 80;
            const dateHeight = 40;
            const watermarkHeight = 60;
            
            const ratioSelect = document.getElementById('canvas-ratio').value;
            const scalePct = document.getElementById('image-scale').value / 100;

            let layoutImageHeight = 0;

            // Calculate Image Size
            if (uploadedImage) {
                currentImageWidth = (canvas.width - (padding * 2)) * scalePct;
                const ratio = currentImageWidth / uploadedImage.width;
                currentImageHeight = uploadedImage.height * ratio;
                layoutImageHeight = currentImageHeight; // Space reserved in layout calculation
            }

            ctx.font = '24px -apple-system, sans-serif';
            const wrappedContent = wrapText(content, canvas.width - (padding * 2), 36);
            const textHeight = wrappedContent.lines.length * 36;

            // Set Canvas Height (only if not actively dragging)
            if (!isDraggingUpdate) {
                const dynamicHeight = padding + titleHeight + dateHeight + (uploadedImage ? layoutImageHeight + padding : 0) + textHeight + (padding * 2) + watermarkHeight + padding;

                if (ratioSelect === '1:1') canvas.height = 1000;
                else if (ratioSelect === '3:4') canvas.height = 1333;
                else if (ratioSelect === '9:16') canvas.height = 1778;
                else if (ratioSelect === '16:9') canvas.height = 562;
                else canvas.height = dynamicHeight; // Auto
            }

            // Draw Background
            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Watermarks & Ornate Elements
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.font = '200px serif';
            ctx.fillText('𝕶', canvas.width - 250, 250);

            ctx.font = '30px serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillText('⚜', 30, 60);
            ctx.fillText('⚜', canvas.width - 60, canvas.height - 30);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.font = '24px serif';
            ctx.fillText('╔═══════', 30, 40);
            ctx.fillText('═══════╗', canvas.width - 150, 40);
            ctx.fillText('╚═══════', 30, canvas.height - 30);
            ctx.fillText('═══════╝', canvas.width - 150, canvas.height - 30);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.font = '12px sans-serif';
            ctx.letterSpacing = '5px';
            ctx.fillText('KIGL TRANSMISSION PRO', padding, padding);
            ctx.fillText('CONFIDENTIAL', canvas.width - padding - 150, canvas.height - padding);
            
            ctx.font = '10px serif';
            ctx.fillText('✧✦✧✦✧✦✧✦✧✦', padding, canvas.height - padding + 20);

            ctx.letterSpacing = '0px';

            // Draw Title
            ctx.fillStyle = '#f4f4f4';
            ctx.font = '400 64px -apple-system, sans-serif';
            ctx.fillText(title, padding, padding + 70);

            // Draw Timestamp
            const timestamp = `TRANSMITTED: ${new Date().toLocaleTimeString()} [${new Date().toLocaleDateString()}]`;
            ctx.fillStyle = '#888888';
            ctx.font = '12px sans-serif';
            ctx.letterSpacing = '2px';
            ctx.fillText(timestamp, padding, padding + 70 + 40);
            ctx.letterSpacing = '0px';

            // Establish standard text starting point based on layout
            let standardLayoutY = padding + titleHeight + dateHeight + padding;

            // Draw Uploaded Image at Custom Coordinates
            if (uploadedImage) {
                // If coordinates aren't set yet (new image), center it natively
                if (customImageX === null || customImageY === null) {
                    customImageX = padding + ((canvas.width - (padding * 2) - currentImageWidth) / 2);
                    customImageY = standardLayoutY;
                }
                
                ctx.drawImage(uploadedImage, customImageX, customImageY, currentImageWidth, currentImageHeight);
                standardLayoutY += layoutImageHeight + padding; // Push text down natively
            }

            // Draw Content Text
            ctx.fillStyle = '#f4f4f4';
            ctx.font = '24px -apple-system, sans-serif';
            ctx.lineHeight = 36;
            
            wrappedContent.lines.forEach((line, index) => {
                // Stop drawing text if it falls off the bottom of a fixed-ratio canvas
                if (standardLayoutY + (index * 36) < canvas.height - padding - watermarkHeight) {
                    ctx.fillText(line, padding, standardLayoutY + (index * 36));
                }
            });

            // Update Download Button
            generatedDataUrl = canvas.toDataURL('image/png');
            downloadBtn.disabled = false;
            downloadBtn.style.backgroundColor = '#f4f4f4';
            downloadBtn.style.color = '#0d0d0d';
        }

        function wrapText(text, maxWidth, lineHeight) {
            const paragraphs = text.split('\n');
            const lines = [];
            
            paragraphs.forEach(paragraph => {
                if (paragraph === "") {
                    lines.push("");
                    return;
                }
                const words = paragraph.split(' ');
                let line = '';
                
                for (let n = 0; n < words.length; n++) {
                    const testLine = line + words[n] + ' ';
                    const metrics = ctx.measureText(testLine);
                    const testWidth = metrics.width;
                    
                    if (testWidth > maxWidth && n > 0) {
                        lines.push(line.trim());
                        line = words[n] + ' ';
                    } else {
                        line = testLine;
                    }
                }
                lines.push(line.trim());
            });
            return { lines: lines };
        }

        function downloadImagePost() {
            if (!generatedDataUrl) return;
            const title = document.getElementById('post-title').value.replace(/[^a-z0-9]/gi, '_').toLowerCase() || 'post';
            const filename = `kigl_${title}_${Date.now()}.png`;

            const link = document.createElement('a');
            link.download = filename;
            link.href = generatedDataUrl;
            link.click();
            
            alert(`✅ Downloaded as '${filename}'.\n\nDon't forget to add this filename to the POST_FILES array in your HTML code to display it on the public feed!`);
            
            downloadBtn.disabled = true;
            downloadBtn.style.backgroundColor = 'var(--border-color)';
            downloadBtn.style.color = 'var(--nav-text)';
        }
    </script>
